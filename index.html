<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mở Phong Bì Thư</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Chakra Petch', 'sans-serif'],
                        fraunces: ['Fraunces', 'serif'],
                        comic: ['Comic Sans MS', 'Chalkboard SE', 'sans-serif']
                    },
                    animation: {
                        'bounce-slow': 'bounce 2s infinite',
                        'wiggle': 'wiggle 1s ease-in-out infinite',
                    },
                    keyframes: {
                        wiggle: {
                            '0%, 100%': { transform: 'rotate(-3deg)' },
                            '50%': { transform: 'rotate(3deg)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f5f5f4; color: #333; overflow-x: hidden; }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
    </style>
</head>

<body class="bg-stone-50 font-sans">
    
    <audio id="bg-music" loop>
        <source src="nhac1.mp3" type="audio/mpeg">
    </audio>

    <div id="envelope-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center min-h-screen bg-[#fff0f5] overflow-hidden transition-opacity duration-1000">
        <div class="absolute inset-0 pointer-events-none opacity-20">
            <div class="absolute top-10 left-10 text-4xl text-pink-300 transform -rotate-12"><i class="fas fa-heart"></i></div>
            <div class="absolute top-20 right-20 text-4xl text-pink-400 transform rotate-12"><i class="fas fa-star"></i></div>
            <div class="absolute bottom-20 left-20 text-4xl text-pink-300 transform rotate-45"><i class="fas fa-cloud"></i></div>
            <div class="absolute bottom-10 right-10 text-4xl text-pink-400 transform -rotate-12"><i class="fas fa-music"></i></div>
        </div>

        <div class="text-center mb-12 z-10">
            <h2 class="font-comic text-5xl md:text-6xl text-[#ff69b4] mb-2 drop-shadow-sm animate-bounce-slow font-bold">Tâm thư online</h2>
            <h3 class="text-2xl md:text-3xl text-[#ff8da1] font-bold tracking-wider bg-white/80 px-6 py-2 rounded-full inline-block backdrop-blur-sm"></h3>
        </div>

        <div class="relative w-full max-w-[380px] h-[260px] perspective-1000 z-20 transition-transform duration-500 hover:scale-[1.02]">
            <div class="absolute inset-x-4 bottom-[-20px] h-8 bg-[#ff69b4]/20 blur-xl rounded-full animate-pulse"></div>
            <div class="absolute inset-0 bg-[#ffb7c5] rounded-xl shadow-xl border-4 border-white z-0"></div>
            
            <div id="letter" class="absolute top-2 left-1/2 -translate-x-1/2 w-[90%] h-[95%] bg-white border-2 border-dashed border-pink-200 shadow-sm transition-transform duration-[1.2s] ease-in-out rounded-lg translate-y-2 z-10">
                <div class="p-4 flex flex-col items-center space-y-3 pt-6 opacity-70">
                    <div class="w-16 h-16 rounded-full border border-pink-200 overflow-hidden">
                        <img alt="Avatar" class="w-full h-full object-cover" src="hellokitty.png">
                    </div>
                    <div class="w-2/3 h-2 bg-pink-100 rounded-full"></div>
                    <div class="w-1/2 h-2 bg-pink-100 rounded-full"></div>
                </div>
            </div>

            <div id="flap" class="absolute top-0 left-0 w-full h-1/2 z-30 origin-top preserve-3d transition-transform duration-1000 ease-in-out" style="clip-path: polygon(0 0, 100% 0, 50% 100%);">
                <div class="absolute top-0 left-0 w-full h-full bg-[#ffc1cc] shadow-sm border-t-4 border-x-4 border-white"></div>
            </div>

            <div class="absolute bottom-0 left-0 w-full h-full z-20 pointer-events-none">
                <div class="absolute bottom-0 left-0 w-full h-1/2 bg-[#ffb7c5] rounded-b-xl border-b-4 border-x-4 border-white" style="clip-path: polygon(0 100%, 0 0, 50% 40%, 100% 0, 100% 100%);"></div>
                <div class="absolute bottom-6 left-0 w-full text-center z-30 transform translate-y-2">
                    <div class="bg-white/90 mx-10 py-2 rounded-lg shadow-sm border border-pink-100">
                        <p class="text-[#ff69b4] text-xs font-bold uppercase tracking-widest mb-0.5">To:</p>
                        <p class="font-comic text-xl text-[#ff1493] font-bold">Ngọc Anh!</p>
                    </div>
                </div>
            </div>

            <div id="seal" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-40 transition-all duration-500 opacity-100 cursor-pointer">
                <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-lg border-4 border-pink-200 text-[#ff69b4]">
                    <span class="text-4xl animate-wiggle"><i class="fas fa-paw"></i></span>
                </div>
            </div>
        </div>

        <div class="mt-24 z-30">
            <button id="open-btn" class="bg-[#ff69b4] text-white px-6 py-2 rounded-full font-bold shadow-lg animate-bounce text-sm hover:bg-[#ff1493] transition-all duration-300 flex items-center gap-2">
                Mở ra xem <i class="fas fa-envelope"></i>
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const openBtn = document.getElementById('open-btn');
            const envelopeScreen = document.getElementById('envelope-screen');
            const flap = document.getElementById('flap');
            const letter = document.getElementById('letter');
            const seal = document.getElementById('seal');
            
            // --- XỬ LÝ NHẠC CHẠY KHI CHẠM MÀN HÌNH ---
            const bgMusic = document.getElementById('bg-music');
            let musicStarted = false;

            function startMusic() {
                if (!musicStarted) {
                    bgMusic.play().catch(e => console.log("Trình duyệt chặn autoplay"));
                    musicStarted = true;
                }
            }

            // Lắng nghe sự kiện click trên toàn bộ body trang web
            document.body.addEventListener('click', startMusic);
            document.body.addEventListener('touchstart', startMusic); // Cho điện thoại cảm ứng

            function openEnvelope() {
                // Kích hoạt nhạc luôn nếu họ bấm chính xác vào nút/seal mà chưa bấm chỗ khác
                startMusic();
                
                openBtn.classList.add('opacity-0', 'pointer-events-none');
                seal.classList.remove('opacity-100');
                seal.classList.add('opacity-0', 'scale-0');

                flap.style.transform = 'rotateX(180deg)';

                setTimeout(() => {
                    letter.classList.remove('translate-y-2');
                    letter.classList.add('-translate-y-20');
                }, 400);

                setTimeout(() => {
                    envelopeScreen.classList.remove('opacity-100');
                    envelopeScreen.classList.add('opacity-0');
                    
                    setTimeout(() => {
                        window.location.href = 'thuchinh.html'; 
                    }, 800); 
                }, 1600);
            } 

            openBtn.addEventListener('click', openEnvelope);
            seal.addEventListener('click', openEnvelope); 
        });
    </script>
</body>
</html>
